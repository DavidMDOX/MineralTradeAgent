services:
  - type: web
    name: mineral-trade-agent-pro
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SECRET_KEY
        generateValue: true
